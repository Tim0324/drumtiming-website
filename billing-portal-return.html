<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontoverwaltung — RhythmLab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#15161a; --card:#1f2127; --border:#2a2d34; --text:#f1f0ec; --muted:#93959d; --teal:#00c9a0; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--text); font-family:"Inter",sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    max-width:440px; padding:44px 36px; text-align:center;
  }
  .icon{
    width:56px; height:56px; border-radius:50%; background:rgba(0,201,160,0.15);
    display:flex; align-items:center; justify-content:center; margin:0 auto 22px;
    font-size:24px; color:var(--teal);
  }
  h1{ font-family:"Space Grotesk",sans-serif; font-size:24px; margin-bottom:12px; }
  p{ color:var(--muted); font-size:15px; line-height:1.6; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">↩</div>
    <h1>Zurück von der Kontoverwaltung</h1>
    <p>Deine Änderungen wurden bei Stripe gespeichert. Du kannst dieses
       Fenster jetzt schließen und zur App zurückkehren.</p>
  </div>
</body>
</html>
